name: corvion-prod

services:
  app:
    build: .
    restart: always
    env_file: .env.production
    environment:
      # SvelteKit-Default sind 512 KB — Dokumenten-Upload erlaubt 25 MB
      BODY_SIZE_LIMIT: 30M
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/data

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: corvion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD in .env.production setzen}
      POSTGRES_DB: corvion
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U corvion']
      interval: 5s
      timeout: 3s
      retries: 12

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?SITE_ADDRESS in .env.production setzen}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
